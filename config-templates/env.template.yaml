# kaka-deploy 环境变量模板
# 部署时由 AI 引导填入，或手动编辑

# AI 接口配置（必填）
ai:
  api_base: ""          # OpenAI 兼容接口地址，如 https://api.openai.com/v1
  api_key: ""            # API 密钥
  model: ""              # 模型名称，如 gpt-4o, claude-sonnet-4

# 实例身份（必填）
identity:
  agent_name: ""         # 机器人名称，如 kaka, lili
  master_name: ""        # 主人名称
  creator_name: ""       # 创造者名称
  instance_name: ""      # 实例标识

# 临时目录
paths:
  agent_tmp_dir: "~/.hermes/tmp"

# 飞书配置（联动组①，按需填）
feishu:
  app_id: ""
  app_secret: ""
  domain: ""             # 飞书域名前缀
  base_token: ""         # 多维表 Token
  table_id: ""           # 多维表 ID
  kb_token: ""           # 知识库 Token
  kb_table_id: ""        # 知识库表 ID
  user_id: ""            # 飞书用户 ID
  open_id: ""            # 飞书 open_id

# Cloudflare 配置（联动组③，按需填）
cloudflare:
  account_id: ""
  api_token: ""

# GitHub 配置（联动组⑤，按需填）
github:
  username: ""
  token: ""

# 微信配置（联动组⑦，按需填）
wechat:
  user_id: ""
